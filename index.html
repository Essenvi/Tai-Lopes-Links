<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tai Lopes - Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(90deg, #3a3a3a 0%, #5a5a5a 50%, #3a3a3a 100%);
            color: white;
            min-height: 100vh;
        }
        
        /* HEADER */
        .header {
            position: relative;
            height: 200px;
            background: linear-gradient(rgba(58,58,58,0.7), rgba(58,58,58,0.5)), 
                        url('https://i.imgur.com/pSLJwFF.jpeg');
            background-size: cover;
            background-position: center 10%;
            display: flex;
            align-items: center;
            padding: 0 40px;
            margin-bottom: 40px;
        }
        
        .profile-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            background: linear-gradient(45deg, #FF6B8B, #FFA500);
        }
        
        .profile-info {
            display: flex;
            flex-direction: column;
        }
        
        .name {
            font-size: 2.5em;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }
        
        .header-description {
            font-size: 1.1em;
            color: rgba(255,255,255,0.9);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            margin-top: 5px;
        }
        
        /* LOGOS NO TOPO - 6 COLUNAS */
        .top-logos {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            padding: 0 20px;
        }
        
        .logo-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logo-item:hover {
            transform: translateY(-5px);
        }
        
        .logo-icon {
            width: 65px;
            height: 65px;
            border-radius: 15px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .logo-icon img {
            width: 35px;
            height: 35px;
            object-fit: contain;
        }
        
        .logo-item:hover .logo-icon {
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            transform: scale(1.1);
        }
        
        .logo-name {
            font-size: 1em;
            font-weight: 600;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            padding: 6px 14px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* CORES DAS LOGOS */
        .privacy { 
            background: #ffffff;
        }
        .onlyfans { 
            background: #ffffff;
        }
        .telegram-vip { 
            background: #2AABEE;
        }
        .telegram-free { 
            background: #28a745;
        }
        .whatsapp { 
            background: #25D366;
        }
        .instagram { 
            background: linear-gradient(45deg, #F58529, #DD2A7B, #8134AF, #515BD4);
        }
        
        /* GALERIA DE FOTOS - GRID 3-3 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 30px 50px;
        }
        
        .photo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.08);
        }
        
        .photo-container {
            position: relative;
            width: 100%;
            height: 320px;
            overflow: hidden;
        }
        
        .photo-link {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .photo-card:hover .photo-container img {
            transform: scale(1.05);
        }
        
        /* LOGO NO CANTO DA FOTO - CORRIGIDO */
        .photo-logo {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.6);
            z-index: 2;
        }
        
        .photo-logo img {
            width: 25px;
            height: 25px;
            object-fit: contain;
        }
        
        .photo-logo i {
            font-size: 1.3em;
            color: white;
        }
        
        /* CORES DAS LOGOS NOS CARDS */
        .photo-logo.privacy { background: #ffffff; }
        .photo-logo.onlyfans { background: #ffffff; }
        .photo-logo.telegram-vip { background: #2AABEE; }
        .photo-logo.telegram-free { background: #28a745; }
        .photo-logo.whatsapp { background: #25D366; }
        .photo-logo.instagram { background: linear-gradient(45deg, #F58529, #DD2A7B, #8134AF, #515BD4); }
        
        /* NOME DENTRO DA FOTO */
        .platform-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 18px;
            text-align: center;
            font-weight: 600;
            color: white;
            font-size: 1.1em;
            background: rgba(60, 60, 60, 0.7);
            border-top: 1px solid rgba(255,255,255,0.2);
            margin: 0;
            z-index: 2;
        }
        
        /* RESPONSIVO */
        @media (max-width: 768px) {
            .header {
                height: 150px;
                padding: 0 20px;
            }
            
            .profile-pic {
                width: 60px;
                height: 60px;
            }
            
            .name {
                font-size: 2em;
            }
            
            .header-description {
                font-size: 0.9em;
            }
            
            .top-logos {
                gap: 25px;
            }
            
            .logo-icon {
                width: 55px;
                height: 55px;
                font-size: 1.6em;
            }
            
            .logo-icon img {
                width: 30px;
                height: 30px;
            }
            
            .logo-name {
                padding: 5px 10px;
                font-size: 0.9em;
            }
            
            .gallery {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 0 20px 30px;
            }
            
            .photo-container {
                height: 280px;
            }
        }
    @keyframes pulsoAzulEscuro {
    0% {
        border-color: rgba(138, 43, 226, 0.2); 
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    50% {
        /* AZUL MAIS ESCURO E PROFUNDO */
        border-color: #0000FF; /* Azul puro/escuro */
        box-shadow: 0 0 20px #0000FF, 0 0 40px #191970; /* Brilho azul marinho */
    }
    100% {
        border-color: rgba(138, 43, 226, 0.2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
}

.piscando {
    animation: pulsoAzulEscuro 2.5s infinite;
}
